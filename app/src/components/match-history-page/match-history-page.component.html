<div class="container py-4">

    <div class="mb-4">
        <h3 class="fw-semibold mb-1">
            <i class="bi bi-clock-history text-primary me-2"></i>
            Game history
        </h3>
        <p class="text-muted mb-0">Browse and filter past matches</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Type</label>
                        <select class="form-select" formControlName="matchType">
                            <option value="">All</option>
                            <option value="ranked">Ranked</option>
                            <option value="unranked">Unranked</option>
                            <option value="private">Private</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Outcome</label>
                        <select class="form-select" formControlName="outcome">
                            <option value="">All</option>
                            <option value="win">Win</option>
                            <option value="loss">Loss</option>
                            <option value="draw">Draw</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Sort by date</label>
                        <select class="form-select" formControlName="dateSort">
                            <option value="match.startedAt,desc">Newest to oldest</option>
                            <option value="match.startedAt,asc">Oldest to newest</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex align-items-center justify-content-between mt-3">
                    <button href="javascript:void(0)" class="btn btn-link text-decoration-none"
                        (click)="clearFilters()">Clear filters</button>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-funnel me-1"></i>
                        Apply filters
                    </button>
                </div>
            </form>

        </div>
    </div>
    <div class="card shadow-sm border-0 mt-4">
        @if (matches$ | async; as matches){
        @if (matches.total > 0){
        <match-history-table [matches]="matches.matches"></match-history-table>
        <div class="card-footer">
            <pagination [(page)]="page" [pageSize]="PAGE_SIZE" [collectionSize]="matches.total"
                (pageChange)="onPageChange($event)"></pagination>
        </div>
        }
        @else {
        <p class="text-muted text-center mt-3">No matches found</p>
        }
        }
    </div>
</div>
