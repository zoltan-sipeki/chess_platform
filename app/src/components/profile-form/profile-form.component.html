<div class="bg-body border rounded-4 shadow-sm p-4 p-lg-5">
    <div class="pb-5 mb-5 border-bottom">
        <h5 class="fw-semibold mb-4">
            Profile picture
        </h5>
        <avatar-form></avatar-form>
    </div>
    <div>
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-4">
            <div>
                <h5 class="fw-semibold mb-1">
                    Display name
                </h5>
                <p class="text-muted small mb-0">
                    This is shown publicly to other users.
                </p>
            </div>
            <div style="width: 100%; max-width: 360px;">
                <div class="input-group">
                    <input type="text" class="form-control" [formControl]="displayName">
                    <button (click)="updateDisplayName()" class="btn btn-primary" [disabled]="displayName.disabled">
                        Save
                        @if (displayName.disabled) {
                        <div class="spinner-border spinner-border-sm ms-2" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        }
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
