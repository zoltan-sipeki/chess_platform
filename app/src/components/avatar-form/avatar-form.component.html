<div class="d-flex flex-column flex-md-row align-items-md-center gap-4">

    <avatar [src]="avatar()" [width]="200" clazz="rounded-circle border border-3 border-light border-sm shadow">
    </avatar>

    <div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" (click)="selectImage()" [disabled]="uploading() || removing()">
                <div class="d-flex justify-content-between align-items-center">
                    @if (uploading()) {
                    <div class="spinner-border spinner-border-sm me-2" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    }
                    @else {
                    <i class="bi bi-upload me-2"></i>
                    }
                    Change
                </div>
            </button>
            <input #fileInput accept=".jpg,.png" type="file" hidden (change)="onImageSelect()">
            <button class="btn btn-outline-danger" (click)="deleteAvatar()"
                [disabled]="uploading() || removing()">
                <div class="d-flex justify-content-between align-items-center">
                    @if (removing()) {
                    <div class="spinner-border spinner-border-sm me-2" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    }
                    @else {
                    <i class="bi bi-trash me-2"></i>
                    }
                    Remove
                </div>
            </button>
        </div>
        <div class="form-text mt-2">
            Maximum image size: 2MB
        </div>
    </div>

</div>
