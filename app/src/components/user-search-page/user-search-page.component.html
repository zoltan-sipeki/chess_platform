<div class="container py-4">

    <div class="mb-4">
        <h3 class="fw-semibold">
            <i class="bi bi-search me-2 text-primary"></i>
            Search results
        </h3>
        <p class="text-muted mb-0">
            Showing results for <span class="fw-semibold">"{{ prefix() }}"</span>
        </p>
    </div>

    @if(!loading()) {
    <div class="card border-0 shadow-sm">

        @if(searchResult(); as searchResult){
        <div class="list-group list-group-flush">

            @for (user of searchResult.users; track user.id)
            {
            <div class="list-group-item px-3 py-3">
                <div class="d-flex align-items-center justify-content-between">

                    <div class="d-flex align-items-center gap-3">
                        <user [id]="user.id" [displayName]="user.displayName" [avatar]="user.avatar">
                        </user>
                    </div>

                    <div>
                        <button class="btn btn-sm btn-outline-primary">
                            View profile
                        </button>
                    </div>

                </div>
            </div>
            }
        </div>

        <div class="card-footer bg-white border-top">
            <pagination [(page)]="page" [pageSize]="PAGE_SIZE" [collectionSize]="searchResult.total"
                (pageChange)="onPageChange($event)">
            </pagination>
        </div>
        }

    </div>

    }
</div>
