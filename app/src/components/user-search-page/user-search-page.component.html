<div class="container">
    <h3 class="mt-2 mb-4"><i class="bi bi-search me-1"></i> Search results for "{{ prefix() }}"</h3>
    <ul class="list-group mb-3">
        @for (user of userSearchResult().users | slice : (page() - 1) * pageSize : page() * pageSize; track user.id)
        {
        <li class="list-group-item list-group-item-action">
            <user [id]="user.id" [displayName]="user.displayName" [avatar]="user.avatar"></user>
        </li>
        }
    </ul>
    <pagination [(page)]="page" [pageSize]="pageSize" [collectionSize]="userSearchResult().users.length"></pagination>
</div>
