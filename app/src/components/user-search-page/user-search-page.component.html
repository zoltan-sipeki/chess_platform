<div class="container py-4">

    <div class="mb-4">
        <h3 class="fw-semibold">
            <i class="bi bi-search me-2 text-primary"></i>
            Search results
        </h3>
        <p class="text-muted mb-0">
            Showing results for <span class="fw-semibold">"{{ prefix() }}"</span>
        </p>
    </div>

    <div class="card border-0 shadow-sm">

        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <span class="fw-semibold">
                {{ userSearchResult().users.length }} users found
            </span>
        </div>

        <div class="list-group list-group-flush">

            @for (user of userSearchResult().users
            | slice : (page() - 1) * pageSize : page() * pageSize; track user.id)
            {
            <div class="list-group-item px-3 py-3">
                <div class="d-flex align-items-center justify-content-between">

                    <div class="d-flex align-items-center gap-3">
                        <user [id]="user.id" [displayName]="user.displayName" [avatar]="user.avatar">
                        </user>
                    </div>

                    <div>
                        <button class="btn btn-sm btn-outline-primary">
                            View profile
                        </button>
                    </div>

                </div>
            </div>
            }

        </div>

        <div class="card-footer bg-white border-top">
            <pagination [(page)]="page" [pageSize]="pageSize" [collectionSize]="userSearchResult().users.length">
            </pagination>
        </div>

    </div>

</div>
