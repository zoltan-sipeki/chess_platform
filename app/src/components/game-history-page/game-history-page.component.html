<div class="container py-4">

    <div class="mb-4">
        <h3 class="fw-semibold mb-1">
            <i class="bi bi-clock-history text-primary me-2"></i>
            Game history
        </h3>
        <p class="text-muted mb-0">Browse and filter your past matches</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Type</label>
                        <select class="form-select">
                            <option value="all">All</option>
                            <option value="ranked">Ranked</option>
                            <option value="unranked">Unranked</option>
                            <option value="private">Private</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Outcome</label>
                        <select class="form-select">
                            <option value="all">All</option>
                            <option value="win">Win</option>
                            <option value="loss">Loss</option>
                            <option value="draw">Draw</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Sort by date</label>
                        <select class="form-select">
                            <option value="desc">Newest to oldest</option>
                            <option value="asc">Oldest to newest</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex align-items-center justify-content-between mt-3">
                    <a href="javascript:void(0)" class="text-decoration-none">Clear filters</a>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-funnel me-1"></i>
                        Apply filters
                    </button>
                </div>
            </form>

        </div>
    </div>
    <div class="card shadow-sm border-0 mt-4">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Played</th>
                        <th>Duration</th>
                        <th>Type</th>
                        <th>Result</th>
                        <th>MMR</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th>1</th>
                        <td>1 day ago</td>
                        <td>30:25</td>
                        <td>RANKED</td>
                        <td><span class="badge bg-success-subtle text-success">Win</span></td>
                        <td class="text-success fw-semibold">+25</td>
                        <td><a href="javascript:void(0)">replay</a></td>
                    </tr>
                    <tr>
                        <th>2</th>
                        <td>2 days ago</td>
                        <td>23:12</td>
                        <td>RANKED</td>
                        <td><span class="badge bg-danger-subtle text-danger">Loss</span></td>
                        <td class="text-danger fw-semibold">-25</td>
                        <td><a href="javascript:void(0)">replay</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
