<div class="container py-4">

    <!-- HEADER -->
    <div class="mb-4">
        <h3 class="fw-semibold">
            <i class="bi bi-person-gear me-2 text-primary"></i> User settings
        </h3>
        <p class="text-muted mb-0">Manage your profile and preferences</p>
    </div>

    <div class="row g-4">

        <!-- SIDEBAR -->
        <div class="col-lg-3">
            <div class="card border-0 shadow-sm">
                <div ngbNav #nav="ngbNav" [(activeId)]="active" class="nav nav-underline flex-column p-2">

                    <ng-container ngbNavItem="edit-profile">
                        <button ngbNavLink class="nav-link text-start">
                            <i class="bi bi-person me-2"></i> Edit profile
                        </button>

                        <ng-template ngbNavContent>
                            <div class="card border-0 shadow-sm mb-4">
                                <div class="card-body">
                                    <h5 class="fw-semibold mb-4">Avatar</h5>

                                    <div class="row align-items-center">
                                        <div class="col-md-4 text-center mb-3 mb-md-0">
                                            <img src="imgs/default-profile-image.jpg"
                                                class="rounded-circle shadow-sm border" width="140" height="140"
                                                style="object-fit: cover;">
                                        </div>

                                        <div class="col-md-8">
                                            <div class="d-flex gap-2">
                                                <button type="button" class="btn btn-primary btn-sm">
                                                    <i class="bi bi-upload me-1"></i> Change
                                                </button>
                                                <button class="btn btn-outline-danger btn-sm">
                                                    Remove
                                                </button>
                                            </div>
                                            <div class="form-text mt-2">
                                                JPG or PNG, max 2MB
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="card border-0 shadow-sm mb-4">
                                <div class="card-body">
                                    <h5 class="fw-semibold mb-4">Account</h5>

                                    <div class="row g-4">

                                        <div class="col-md-6">
                                            <label class="form-label text-muted small">Username</label>
                                            <input type="text" class="form-control mb-2" value="Potato">
                                            <button class="btn btn-sm btn-outline-secondary">Save</button>
                                        </div>

                                        <div class="col-md-6">
                                            <label class="form-label text-muted small">E-mail</label>
                                            <input type="email" class="form-control mb-2" value="asd@asd.com">
                                            <button class="btn btn-sm btn-outline-secondary">Save</button>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        </ng-template>
                    </ng-container>

                    <ng-container ngbNavItem="change-password">
                        <button ngbNavLink class="nav-link text-start">
                            <i class="bi bi-lock me-2"></i> Password
                        </button>

                        <ng-template ngbNavContent>
                            <div class="card border-0 shadow-sm">
                                <div class="card-body">
                                    <h5 class="fw-semibold mb-4">Change password</h5>

                                    <form style="max-width: 400px;">
                                        <div class="mb-3">
                                            <label class="form-label text-muted small">Current password</label>
                                            <input type="password" class="form-control">
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label text-muted small">New password</label>
                                            <input type="password" class="form-control">
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label text-muted small">Confirm password</label>
                                            <input type="password" class="form-control">
                                        </div>

                                        <button class="btn btn-primary">
                                            Update password
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </ng-template>
                    </ng-container>

                    <ng-container ngbNavItem="privacy-settings">
                        <button ngbNavLink class="nav-link text-start">
                            <i class="bi bi-shield-lock me-2"></i> Privacy
                        </button>

                        <ng-template ngbNavContent>
                            <div class="card border-0 shadow-sm">
                                <div class="card-body">
                                    <h5 class="fw-semibold mb-4">Privacy settings</h5>

                                    <div class="row g-3" style="max-width: 500px;">

                                        <div>
                                            <label class="form-label text-muted small">General information</label>
                                            <select class="form-select">
                                                <option>Public</option>
                                                <option>Friends only</option>
                                                <option>Private</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label class="form-label text-muted small">Friends</label>
                                            <select class="form-select">
                                                <option>Public</option>
                                                <option>Friends only</option>
                                                <option>Private</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label class="form-label text-muted small">Stats</label>
                                            <select class="form-select">
                                                <option>Public</option>
                                                <option>Friends only</option>
                                                <option>Private</option>
                                            </select>
                                        </div>

                                        <div>
                                            <label class="form-label text-muted small">Recent games</label>
                                            <select class="form-select">
                                                <option>Public</option>
                                                <option>Friends only</option>
                                                <option>Private</option>
                                            </select>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        </ng-template>
                    </ng-container>
                    <ng-container ngbNavItem="delete-account">
                        <button ngbNavLink class="nav-link text-start text-danger">
                            <i class="bi bi-trash me-2"></i> Delete account
                        </button>

                        <ng-template ngbNavContent>
                            <div class="card border-danger-subtle shadow-sm">
                                <div class="card-body">

                                    <h5 class="fw-semibold text-danger mb-3">
                                        <i class="bi bi-exclamation-triangle me-2"></i>
                                        Delete account
                                    </h5>

                                    <p class="text-muted">
                                        This action is permanent. All your data will be removed and cannot be recovered.
                                    </p>

                                    <button class="btn btn-danger">
                                        Delete account permanently
                                    </button>

                                </div>
                            </div>
                        </ng-template>
                    </ng-container>

                </div>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="col-lg-9">
            <div [ngbNavOutlet]="nav"></div>
        </div>

    </div>
</div>
