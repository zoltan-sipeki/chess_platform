<div ngbDropdown display="dynamic" class="d-inline-block ms-3" [class]="clazz()" role="button">
    <div class="d-flex align-items-center" ngbDropdownToggle>
        <div class="navbar-text me-2 text-small">{{ userData().displayName }}</div>
        <avatar clazz="rounded-circle" [src]="userData().avatar" [width]="30"></avatar>
    </div>
    <div ngbDropdownMenu class="shadow">
        <a [routerLink]="['/dashboard', 'users', userData().id]" ngbDropdownItem>View profile</a>
        <a routerLink="/dashboard/settings" ngbDropdownItem>Settings</a>
        <hr class="dropdown-divider">
        <button ngbDropdownItem>Online</button>
        <button ngbDropdownItem>Away</button>
        <button ngbDropdownItem>Offline</button>
        <hr class="dropdown-divider">
        <a [href]="logoutUrl()" ngbDropdownItem>Logout</a>
    </div>
</div>
