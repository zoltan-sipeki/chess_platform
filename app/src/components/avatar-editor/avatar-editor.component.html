<div class="modal-header">
    <h5 class="modal-title">Edit avatar</h5>
    <button type="button" class="btn-close" (click)="close()"></button>
</div>
<div class="modal-body">
    <div class="mx-auto" [style.width.px]="CANVAS_WIDTH">
        <canvas #mainCanvas class="border shadow-sm" id="main-canvas" (mousedown)="startDragging($event)"
            (wheel)="wheelScale($event)" [width]="CANVAS_WIDTH" [height]="CANVAS_HEIGHT"></canvas>
        <canvas #offScreenCanvas [width]="AVATAR_SIZE" [height]="AVATAR_SIZE" hidden></canvas>
        <input type="range" class="form-range" min="1" max="100" step="1" [formControl]="rangeScale" />
        <div class="d-flex justify-content-center">
            <button class="btn btn-sm btn-primary" (click)="submit()">Submit</button>
        </div>
    </div>
</div>
