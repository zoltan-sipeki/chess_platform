<div class="container py-4">

    <div class="mb-4">
        <h3 class="fw-semibold mb-1">
            <i class="bi bi-people text-primary me-2"></i>
            Friends
        </h3>
        <p class="text-muted mb-0">Browse and filter your friends</p>
    </div>


    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Friendship type</label>
                        <select class="form-select">
                            <option value="all">All</option>
                            <option value="mutual">Mutual</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Sort by name</label>
                        <select class="form-select">
                            <option value="asc">A-Z</option>
                            <option value="desc">Z-A</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex align-items-center justify-content-between mt-3">
                    <a href="javascript:void(0)" class="text-decoration-none">Clear filters</a>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-funnel me-1"></i>
                        Apply filters
                    </button>
                </div>
            </form>

        </div>
    </div>
    <div class="card border-0 shadow-sm mt-4">
        <div class="list-group list-group-flush">
            <div class="list-group-item px-3 py-3">
                <div class="d-flex align-items-center justify-content-between">

                    <div class="d-flex align-items-center gap-3">
                        <user id="Asd" displayName="Asd">
                        </user>
                    </div>

                    <div>
                        <button class="btn btn-sm btn-outline-primary">
                            View profile
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <div class="card-footer bg-white border-top">
        </div>

    </div>

</div>
