spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration
  datasource:
    url: jdbc:postgresql://postgres/relay_db
    username: relay_service
    password: "${postgres-relay-service-password}"
  jackson:
    default-property-inclusion: NON-NULL
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format-sql: true
        highlight-sql: true
  rabbitmq:
    host: rabbitmq
    port: 5672
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "${keycloak.url}/realms/chess"
      client:
        registration:
          keycloak:
            client-id: cp_relay_service
            client-secret: "${keycloak-relay-service-client-secret}"
            client-authentication-method: client_secret_post
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: "${keycloak.url}/realms/chess"
            jwk-set-uri: "${keycloak.url}/realms/chess/protocol/openid-connect/certs"
            token-uri: "${keycloak.url}/realms/chess/protocol/openid-connect/token"

keycloak:
  url: http://keycloak:8080

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8080/eureka/

ws-connections:
  unauthenticated:
    timeout-ms: 15000

rabbitmq-messaging:
  queue:
    service: relay-service-queue
  routing-key:
    service: relay-service
    service-fanout: relay-service-fanout
    chess-service: chess-service
    chat-service: chat-service
    matchmaking-service: matchmaking-service
    user-service: user-service
  user-service:
    events:
      exchange: user-events-exchange
  chess-service:
    events:
      exchange: chess-events-exchange
  chat-service:
    events:
      exchange: chat-events-exchange
  matchmaking-service:
    events:
      exchange: matchmaking-events-exchange
  relay-service:
    events:
      exchange: relay-events-exchange
      fanout-exchange: relay-events-fanout-exchange
