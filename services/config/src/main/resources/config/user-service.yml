spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration
  datasource:
    url: jdbc:postgresql://postgres/user_db
    username: user_service
    password: "${postgres-user-service-password}"
  jackson:
    default-property-inclusion: NON-NULL
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format-sql: true
        highlight-sql: true
  rabbitmq:
    host: rabbitmq
    port: 5672
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "${keycloak.url}/realms/chess"
      client:
        registration:
          keycloak:
            client-id: cp_user_service
            client-secret: "${keycloak-user-service-client-secret}"
            client-authentication-method: client_secret_post
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: "${keycloak.url}/realms/master"
            jwk-set-uri: "${keycloak.url}/realms/master/protocol/openid-connect/certs"
            token-uri: "${keycloak.url}/realms/master/protocol/openid-connect/token"

keycloak:
  url: http://keycloak:8080

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8080/eureka/

rabbitmq-messaging:
  service:
    queue: user-service-queue
  routing-key:
    service: user-service
    chat-service: chat-service
    matchmaking-service: matchmaking-service
    match-service: match-service
    relay-service: relay-service
  keycloak:
    events:
      exchange: keycloak-events-exchange
  user-service:
    events:
      exchange: user-events-exchange
