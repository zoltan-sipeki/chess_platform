spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration
  datasource:
    url: jdbc:postgresql://postgres/matchmaking_db
    username: matchmaking_service
    password: "${postgres-matchmaking-service-password}"
  jackson:
    default-property-inclusion: NON-NULL
  jpa:
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format-sql: true
        highlight-sql: true
  rabbitmq:
    host: rabbitmq
    port: 5672
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: cp_matchmaking_service
            client-secret: "${keycloak-matchmaking-service-client-secret}"
            client-authentication-method: client_secret_post
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: "${keycloak.url}/realms/chess"
            jwk-set-uri: "${keycloak.url}/realms/chess/protocol/openid-connect/certs"
            token-uri: "${keycloak.url}/realms/chess/protocol/openid-connect/token"

keycloak:
  url: http://keycloak:8080

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8080/eureka/

matchmaking:
  expand-mmr-range-interval-ms: 150000 # 2.5 mins
  max-time-in-queue-ms: 300000 # 5 mins
  token:
    issuer: matchmaking-service
    expiration: 365d
    algorithm: RSA512
    private-key: "${mmtoken-private-key}"
    public-key: "${mmtoken-public-key}"

rabbitmq-messaging:
  queue:
    service: matchmaking-service-queue
  routing-key:
    service: matchmaking-service
    relay-service: relay-service
    relay-service-fanout: relay-service-fanout
    user-service: user-service
  user-service:
    events:
      exchange: user-events-exchange
  matchmaking-service:
    reply:
      exchange: matchmaking-reply-exchange
    events:
      exchange: matchmaking-events-exchange
