spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration
  jackson:
    default-property-inclusion: NON_NULL
  rabbitmq:
    host: rabbitmq
    port: 5672
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/chess

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8080/eureka/

server:
  port: 8080

rabbitmq-messaging:
  routing-key:
    matchmaking-service: matchmaking_service
  matchmaking-service:
    reply:
      exchange: matchmaking_reply_exchange
